# Push to main → SSH to Hetzner (same host as PetPal), pull, build, reload PM2 barbershop.
#
# One-time setup (GitHub repo → Settings → Secrets and variables → Actions):
#   DEPLOY_HOST     e.g. 116.203.209.68
#   DEPLOY_USER     e.g. root
#   DEPLOY_SSH_KEY  private key (PEM) that can SSH as DEPLOY_USER
# Optional:
#   DEPLOY_PORT     default 22
#   DEPLOY_PATH     default /root/barbershop
#
# One-time setup on the server (same VPS as PetPal):
#   1. git clone https://github.com/mx95/barbershop.git /root/barbershop
#   2. cp .env.example .env.local  # configure Resend, Twilio, admin passwords, etc.
#   3. bash scripts/deploy-server.sh && pm2 save
#   4. Add the GitHub Actions public key to ~/.ssh/authorized_keys
#
# PetPal continues on :5002 (petpal.com.cy). Barbershop uses :3000 — no port conflict.

name: Deploy server

on:
  push:
    branches:
      - main
  workflow_dispatch:
    inputs:
      branch:
        description: Branch to deploy
        required: false
        default: main

concurrency:
  group: deploy-barbershop-server
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 25
    steps:
      - name: Deploy over SSH
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.DEPLOY_HOST }}
          username: ${{ secrets.DEPLOY_USER }}
          key: ${{ secrets.DEPLOY_SSH_KEY }}
          command_timeout: 20m
          script: |
            set -euo pipefail
            BARBERSHOP_ROOT="${{ secrets.DEPLOY_PATH }}"
            if [ -z "$BARBERSHOP_ROOT" ]; then BARBERSHOP_ROOT="/root/barbershop"; fi
            export BARBERSHOP_ROOT
            export DEPLOY_BRANCH="${{ github.event.inputs.branch || github.ref_name }}"
            bash "$BARBERSHOP_ROOT/scripts/deploy-server.sh"
